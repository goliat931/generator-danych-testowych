<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Zbiorów Danych</title>
    <link rel="stylesheet" href="static/styles.css">
    <link rel="icon" type="image/x-icon" href="static/logo.ico">
    <link rel="canonical" href="goliat931.github.io/generator-danych-testowych" />
    <meta name="description" content="Narzędzie do generowania zbiorów danych testowych z różnymi formatami eksportu." />
</head>
<body>
    <div class="button-group">
        <div class="theme-switch">
            <label for="themeToggle" class="theme-label">
                <button class="theme-toggle" id="theme-toggle" title="Toggles light & dark" aria-label="auto" aria-live="polite">
                    <svg class="sun-and-moon" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24">
                        <mask class="moon" id="moon-mask">
                        <rect x="0" y="0" width="100%" height="100%" fill="white" />
                        <circle cx="24" cy="10" r="6" fill="black" />
                        </mask>
                        <circle class="sun" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
                        <g class="sun-beams" stroke="currentColor">
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </g>
                    </svg>
                </button>               
            </label>
        </div>
        <a href="index.html" class="nav-button">← Powrót do Generatorów</a>
    </div>

    <div class="container">
        <h1>Generator Zbiorów Danych</h1>
        
        <div class="dataset-generator-tile">
            <h2>Konfiguracja Eksportu</h2>

            <!-- Wybór danych -->
            <div class="config-section">
                <h3>Dane do wygenerowania</h3>
                <div class="data-selection">
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="pesel" checked>
                        <span class="drag-handle">⋮⋮</span> PESEL
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="id" checked>
                        <span class="drag-handle">⋮⋮</span> Dowód Osobisty
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="regon" checked>
                        <span class="drag-handle">⋮⋮</span> REGON
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="firstName" checked>
                        <span class="drag-handle">⋮⋮</span> Imię
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="surname" checked>
                        <span class="drag-handle">⋮⋮</span> Nazwisko
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="imie" checked>
                        <span class="drag-handle">⋮⋮</span> Imię
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="nazwa" checked>
                        <span class="drag-handle">⋮⋮</span> Nazwisko
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="imie_ojca" checked>
                        <span class="drag-handle">⋮⋮</span> Imię ojca
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="imie_matki" checked>
                        <span class="drag-handle">⋮⋮</span> Imię matki
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="sex" checked>
                        <span class="drag-handle">⋮⋮</span> Płeć
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="citizenship" checked>
                        <span class="drag-handle">⋮⋮</span> Obywatelstwo
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="birthdate" checked>
                        <span class="drag-handle">⋮⋮</span> Data urodzenia
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="birthCountry" checked>
                        <span class="drag-handle">⋮⋮</span> Kraj urodzenia
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="birthcity" checked>
                        <span class="drag-handle">⋮⋮</span> Miasto urodzenia
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="document_type" checked>
                        <span class="drag-handle">⋮⋮</span> Typ dokumentu
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="dok_tozs" checked>
                        <span class="drag-handle">⋮⋮</span> Nr dokumentu
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="dok_expirydate" checked>
                        <span class="drag-handle">⋮⋮</span> Data wygaśnięcia dokumentu
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="ulica" checked>
                        <span class="drag-handle">⋮⋮</span> Ulica
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="nr_domu" checked>
                        <span class="drag-handle">⋮⋮</span> Nr domu
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="nr_lokalu" checked>
                        <span class="drag-handle">⋮⋮</span> Nr lokalu
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="kod_pocztowy" checked>
                        <span class="drag-handle">⋮⋮</span> Kod pocztowy
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="miasto" checked>
                        <span class="drag-handle">⋮⋮</span> Miasto
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="kraj" checked>
                        <span class="drag-handle">⋮⋮</span> Kraj
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="telk" checked>
                        <span class="drag-handle">⋮⋮</span> Telefon komórkowy
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="teld" checked>
                        <span class="drag-handle">⋮⋮</span> Telefon domowy
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="mail" checked>
                        <span class="drag-handle">⋮⋮</span> Email
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="bankaccount" checked>
                        <span class="drag-handle">⋮⋮</span> rachunek bankowy
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="comment" checked>
                        <span class="drag-handle">⋮⋮</span> Komentarz
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="season_string" checked>
                        <span class="drag-handle">⋮⋮</span> Pora roku
                    </label>
                    <label class="draggable-item">
                        <input type="checkbox" name="data-field" value="token" checked>
                        <span class="drag-handle">⋮⋮</span> token
                    </label>
                </div>
            </div>

            <!-- Ilość rekordów -->
            <div class="config-section">
                <label for="recordCount">Liczba rekordów:</label>
                <input type="number" id="recordCount" min="1" max="100000" value="10" placeholder="Liczba wierszy">
            </div>

            <!-- Format eksportu -->
            <div class="config-section">
                <h3>Format eksportu</h3>
                <div class="format-selection">
                    <label>
                        <input type="radio" name="export-format" value="csv" checked>
                        CSV (Comma Separated Values)
                    </label>
                    <label>
                        <input type="radio" name="export-format" value="json">
                        JSON
                    </label>
                    <label>
                        <input type="radio" name="export-format" value="xml">
                        XML
                    </label>
                </div>
            </div>

            <!-- Separator dla CSV -->
            <div class="config-section" id="separatorSection">
                <h3>Separator (CSV)</h3>
                <div class="separator-selection">
                    <label>
                        <input type="radio" name="csv-separator" value="," checked>
                        Przecinek (,)
                    </label>
                    <label>
                        <input type="radio" name="csv-separator" value=";">
                        Średnik (;)
                    </label>
                    <label>
                        <input type="radio" name="csv-separator" value="tab">
                        Tabulacja (Tab)
                    </label>
                    <label>
                        <input type="radio" name="csv-separator" value="|">
                        Rura (|)
                    </label>
                </div>
            </div>

            <!-- Przyciski generowania i pobierania -->
            <div class="button-group-dataset">
                <button id="generateDatasetBtn">📋 Generuj</button>
                <button id="downloadDatasetBtn" disabled>📥 Pobierz</button>
            </div>
        </div>

        <div class="preview-tile">
            <h2>Podgląd (pierwsze 5 wierszy)</h2>
            <pre id="previewContent">Podgląd pojawi się tutaj po kliknięciu "Generuj"</pre>
        </div>
    </div>

    <footer>
        <p>© 2025 Generator Danych Testowych • <a href="https://github.com" target="_blank">GitHub</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@faker-js/faker@latest/dist/faker.min.js"></script>
    <script src="static/dataset-generator.js"></script>
</body>
</html>
